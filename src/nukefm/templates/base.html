<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>nuke.fm</title>
    <link rel="icon" type="image/svg+xml" href="{{ request.url_for('static', path='favicon.svg') }}">
    <link rel="stylesheet" href="{{ request.url_for('static', path='app.css') }}">
  </head>
  <body>
    <div class="page-backdrop" aria-hidden="true">
      <div class="backdrop-orb orb-a"></div>
      <div class="backdrop-orb orb-b"></div>
      <div class="backdrop-grid"></div>
    </div>
    <div class="page-shell">
      <header class="site-header">
        <div class="brand-block">
          <a class="brand" href="/">nuke.fm</a>
          <p class="tagline">Compact trading brief for Bags token traders.</p>
        </div>
        <div class="site-status">
          <span class="meta-pill">Read-only frontend</span>
          <p class="meta-note">Private account actions stay in the API.</p>
        </div>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
